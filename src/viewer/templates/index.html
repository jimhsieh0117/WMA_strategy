<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMA Backtest Viewer</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #0a0a0a; color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC",
                   "Hiragino Sans GB", sans-serif;
    }
    #app {
      display: flex; flex-direction: column; height: 100vh;
    }
    #header {
      flex: 0 0 auto;
      padding: 10px 18px;
      background: #141414;
      border-bottom: 1px solid #262626;
      display: flex; gap: 24px; align-items: center;
      flex-wrap: wrap;
    }
    #title {
      font-size: 15px; font-weight: 600; color: #fafafa;
      letter-spacing: 0.5px;
    }
    .metric-group {
      display: flex; gap: 14px; font-size: 12px;
    }
    .metric-pill {
      display: flex; gap: 6px; align-items: baseline;
      padding: 4px 10px;
      background: #1f1f1f;
      border-radius: 4px;
      border: 1px solid #2a2a2a;
    }
    .metric-pill .label { color: #888; }
    .metric-pill .value { color: #fafafa; font-weight: 500; }
    .metric-pill .value.pos { color: #16a34a; }
    .metric-pill .value.neg { color: #dc2626; }
    #indicator-bar {
      flex: 0 0 auto;
      padding: 6px 18px;
      background: #101010;
      border-bottom: 1px solid #262626;
      display: flex; gap: 6px; align-items: center;
      flex-wrap: wrap;
    }
    #indicator-bar .ind-label {
      font-size: 11px; color: #888; margin-right: 6px;
      letter-spacing: 0.4px; text-transform: uppercase;
    }
    .ind-chip {
      font-size: 12px;
      padding: 3px 10px;
      background: #1f1f1f;
      border: 1px solid #2a2a2a;
      color: #888;
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      transition: all 0.12s ease;
    }
    .ind-chip:hover { border-color: #3b82f6; color: #cbd5e1; }
    .ind-chip.active {
      background: #1e3a8a;
      border-color: #3b82f6;
      color: #f1f5f9;
    }
    #charts {
      flex: 1 1 auto;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .chart-panel {
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      flex: 0 0 auto;
    }
    .chart-panel:last-child { border-bottom: 0; }
    .panel-label {
      position: absolute;
      top: 6px; left: 12px;
      z-index: 5;
      font-size: 10px;
      color: #aaa;
      background: rgba(20, 20, 20, 0.85);
      padding: 2px 8px;
      border-radius: 3px;
      pointer-events: none;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .chart-canvas { width: 100%; height: 100%; }
    #loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; z-index: 100;
      font-size: 14px; color: #888;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="title">Loading...</div>
      <div class="metric-group" id="metrics-row"></div>
    </div>
    <div id="indicator-bar">
      <span class="ind-label">Indicators</span>
    </div>
    <div id="charts"><div id="loading">載入中...</div></div>
  </div>

  <script>
  (async () => {
    const { createChart, LineStyle, LineType, ColorType, CrosshairMode, PriceScaleMode } = LightweightCharts;

    // ----- 取資料 -----
    let data;
    try {
      const resp = await fetch('/api/data');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      data = await resp.json();
    } catch (err) {
      document.getElementById('loading').textContent = '載入失敗：' + err.message;
      return;
    }

    // ----- Header -----
    document.getElementById('title').textContent =
      `${data.metadata.symbol} · ${data.metadata.timeframe} · ${data.metadata.sample.toUpperCase()}`;

    const fmtPct = (v) => `${v >= 0 ? '+' : ''}${v.toFixed(2)}%`;
    const metricsRow = document.getElementById('metrics-row');
    const groups = [
      ['Combined', data.metadata.combined_metrics],
      ['Long',     data.metadata.long_metrics],
      ['Short',    data.metadata.short_metrics],
    ];
    groups.forEach(([label, m]) => {
      const cls = m.total_return_pct >= 0 ? 'pos' : 'neg';
      const pill = document.createElement('div');
      pill.className = 'metric-pill';
      pill.innerHTML = `
        <span class="label">${label}</span>
        <span class="value ${cls}">${fmtPct(m.total_return_pct)}</span>
        <span class="label">PF</span><span class="value">${m.profit_factor.toFixed(2)}</span>
        <span class="label">MDD</span><span class="value">${m.max_drawdown_pct.toFixed(1)}%</span>
        <span class="label">WR</span><span class="value">${m.win_rate_pct.toFixed(0)}%</span>
        <span class="label">N</span><span class="value">${m.total_trades}</span>
      `;
      metricsRow.appendChild(pill);
    });

    // ----- 計算各區塊高度 -----
    document.getElementById('loading').remove();
    const chartsHost = document.getElementById('charts');
    const totalHeight = chartsHost.clientHeight;

    // 主圖固定 60%；equity 固定 25%；其餘 panels 共享 15%（依各自 height_ratio）
    const mainRatio = 0.60;
    const equityRatio = 0.25;
    const panelTotalRatio = 1 - mainRatio - equityRatio;

    // panels 是動態的（使用者可切換顯隱），所以 panelRatioSum / heightFor.panel 都
    // 依「當前可見的 panels」計算。
    const heightForMain = Math.floor(totalHeight * mainRatio);
    const heightForEquity = Math.floor(totalHeight * equityRatio);
    function panelHeight(panelSpec, visiblePanelSpecs) {
      const sum = visiblePanelSpecs.reduce((s, p) => s + p.height_ratio, 0) || 1;
      return Math.floor(totalHeight * panelTotalRatio * (panelSpec.height_ratio / sum));
    }

    // ----- 共同圖表選項 -----
    const baseOptions = (height) => ({
      width: chartsHost.clientWidth,
      height,
      layout: {
        background: { type: ColorType.Solid, color: '#0a0a0a' },
        textColor: '#cccccc',
        fontSize: 11,
      },
      grid: {
        vertLines: { color: '#1a1a1a' },
        horzLines: { color: '#1a1a1a' },
      },
      rightPriceScale: { borderColor: '#2a2a2a' },
      timeScale: {
        borderColor: '#2a2a2a',
        timeVisible: true,
        secondsVisible: false,
      },
      crosshair: { mode: CrosshairMode.Normal },
    });

    const lineStyleMap = {
      solid: LineStyle.Solid,
      dashed: LineStyle.Dashed,
      dotted: LineStyle.Dotted,
    };

    const allCharts = [];   // 給時間軸同步用

    function makePanel(label, height) {
      const wrapper = document.createElement('div');
      wrapper.className = 'chart-panel';
      wrapper.style.height = height + 'px';
      const tag = document.createElement('div');
      tag.className = 'panel-label';
      tag.textContent = label;
      wrapper.appendChild(tag);
      const canvas = document.createElement('div');
      canvas.className = 'chart-canvas';
      wrapper.appendChild(canvas);
      chartsHost.appendChild(wrapper);
      return canvas;
    }

    // ===========================================================
    // 主圖：candlestick + overlays + markers
    // ===========================================================
    const mainCanvas = makePanel('Price', heightForMain);
    const mainChart = createChart(mainCanvas, baseOptions(heightForMain));
    allCharts.push(mainChart);

    const candle = mainChart.addCandlestickSeries({
      upColor: '#26a69a', downColor: '#ef5350',
      borderVisible: false,
      wickUpColor: '#26a69a', wickDownColor: '#ef5350',
    });
    candle.setData(data.ohlc);

    // overlays / panels：依 data.indicators 一次建好全部，再依 enabled 切換顯隱
    // ind 結構：{name, label, enabled, overlay_series:[...], panel: {...} | null}
    //
    // overlayRefsByName[name] = LineSeries[]   ← 用 applyOptions({visible}) 切換
    // panelRefsByName[name]   = {wrapper, chart, spec}  ← 用 display none + reflow
    const overlayRefsByName = {};
    const panelRefsByName = {};

    function buildOverlay(s) {
      const series = mainChart.addLineSeries({
        color: s.color,
        lineWidth: s.line_width,
        lineStyle: lineStyleMap[s.line_style] ?? LineStyle.Solid,
        title: s.title,
        priceLineVisible: false,
        lastValueVisible: false,
      });
      series.setData(s.data);
      return series;
    }

    data.indicators.forEach(ind => {
      if (ind.overlay_series && ind.overlay_series.length) {
        overlayRefsByName[ind.name] = ind.overlay_series.map(s => {
          const series = buildOverlay(s);
          if (!ind.enabled) series.applyOptions({ visible: false });
          return series;
        });
      }
    });

    // ----- 持倉連線 + 止損軌道：每筆交易一條獨立 LineSeries -----
    // 之所以不用 single-series + whitespace 的方式，是因為 LWC v4.2
    // 對 line series 的 whitespace 處理在某些情境（特別是配 WithSteps）
    // 並不可靠，會把上一筆 exit 的線延伸到下一筆 entry。
    // 改用「per-trade series」可從物理上隔絕跨 trade 連線。
    //
    // 止損軌道改用 Solid + 手動階梯點（後端在每次 stop 變化前 1 秒
    // 加一個延伸點），不再依賴 LineType.WithSteps。
    if (data.trade_lines) {
      const renderSegments = (segments, opts) => {
        segments.forEach((segPoints, i) => {
          if (!segPoints || segPoints.length < 2) return;
          const series = mainChart.addLineSeries({
            color: opts.color,
            lineWidth: opts.lineWidth,
            lineStyle: opts.lineStyle,
            // 只有第一條 series 帶 title 進 legend，避免 N 條 trades 造成 legend 爆炸
            title: i === 0 ? opts.title : '',
            priceLineVisible: false,
            lastValueVisible: false,
          });
          series.setData(segPoints);
        });
      };

      // 持倉連線（user 要求變細：lineWidth 2 → 1）
      renderSegments(data.trade_lines.holding_wins || [], {
        title: 'Holding (Win)', color: '#16a34a',
        lineWidth: 1, lineStyle: LineStyle.Solid,
      });
      renderSegments(data.trade_lines.holding_losses || [], {
        title: 'Holding (Loss)', color: '#dc2626',
        lineWidth: 1, lineStyle: LineStyle.Solid,
      });

      // 止損軌道（手動階梯，Solid 連線）
      renderSegments(data.trade_lines.long_stops || [], {
        title: 'Long Stop', color: '#fb923c',
        lineWidth: 1, lineStyle: LineStyle.Dashed,
      });
      renderSegments(data.trade_lines.short_stops || [], {
        title: 'Short Stop', color: '#fb923c',
        lineWidth: 1, lineStyle: LineStyle.Dashed,
      });
    }

    // markers：long / short 的進出場
    // 多倉並行（pyramiding）模式下，同一根 K 可能有多筆 entry / exit。
    // marker 文字含 #position_id 讓 entry ↔ exit 能配對。
    const markers = [];
    const pidTag = (t) => (t.position_id ? `#${t.position_id} ` : '');
    data.trades.long.forEach(t => {
      markers.push({
        time: t.entry_time,
        position: 'belowBar',
        color: '#2563eb',
        shape: 'arrowUp',
        text: `L${pidTag(t)}${t.entry_price.toFixed(2)}`,
      });
      markers.push({
        time: t.exit_time,
        position: 'aboveBar',
        color: t.net_pnl >= 0 ? '#16a34a' : '#dc2626',
        shape: 'arrowDown',
        text: `${pidTag(t)}${t.return_pct >= 0 ? '+' : ''}${t.return_pct.toFixed(1)}%`,
      });
    });
    data.trades.short.forEach(t => {
      markers.push({
        time: t.entry_time,
        position: 'aboveBar',
        color: '#ea580c',
        shape: 'arrowDown',
        text: `S${pidTag(t)}${t.entry_price.toFixed(2)}`,
      });
      markers.push({
        time: t.exit_time,
        position: 'belowBar',
        color: t.net_pnl >= 0 ? '#16a34a' : '#dc2626',
        shape: 'arrowUp',
        text: `${pidTag(t)}${t.return_pct >= 0 ? '+' : ''}${t.return_pct.toFixed(1)}%`,
      });
    });
    markers.sort((a, b) => a.time - b.time);
    candle.setMarkers(markers);

    // ===========================================================
    // 各副面板（依 data.indicators 中的 panel 物件）
    // 全部一次建立，未勾選的 wrapper 隱藏；切換時 reflow 高度
    // ===========================================================
    function buildPanelChart(panelSpec) {
      // 暫用初始可見集計算高度，之後 reflow 會重算
      const initialVisible = data.indicators
        .filter(i => i.enabled && i.panel)
        .map(i => i.panel);
      const h = panelHeight(panelSpec,
        initialVisible.length ? initialVisible : [panelSpec]);
      const wrapper = document.createElement('div');
      wrapper.className = 'chart-panel';
      wrapper.style.height = h + 'px';
      const tag = document.createElement('div');
      tag.className = 'panel-label';
      tag.textContent = panelSpec.title;
      wrapper.appendChild(tag);
      const canvas = document.createElement('div');
      canvas.className = 'chart-canvas';
      wrapper.appendChild(canvas);
      // equity 永遠在最後 → 插在 equity 之前。但 equity 還沒建，先 append。
      chartsHost.appendChild(wrapper);

      const chart = createChart(canvas, baseOptions(h));
      allCharts.push(chart);

      let refSeries = null;
      panelSpec.series.forEach((s, i) => {
        let series;
        if (s.type === 'histogram') {
          series = chart.addHistogramSeries({
            color: s.color, title: s.title,
            priceFormat: { type: 'volume' },
            priceLineVisible: false,
          });
        } else if (s.type === 'area') {
          series = chart.addAreaSeries({
            topColor: s.color + '33',
            bottomColor: s.color + '00',
            lineColor: s.color, title: s.title,
          });
        } else {
          series = chart.addLineSeries({
            color: s.color,
            lineWidth: s.line_width,
            lineStyle: lineStyleMap[s.line_style] ?? LineStyle.Solid,
            title: s.title,
            priceLineVisible: false,
            lastValueVisible: i === 0,
          });
        }
        series.setData(s.data);
        if (i === 0) refSeries = series;
      });

      panelSpec.horizontal_lines.forEach(line => {
        if (refSeries) {
          refSeries.createPriceLine({
            price: line.value,
            color: line.color,
            lineWidth: 1,
            lineStyle: LineStyle.Dashed,
            axisLabelVisible: line.label !== '',
            title: line.label,
          });
        }
      });

      return { wrapper, chart, spec: panelSpec };
    }

    data.indicators.forEach(ind => {
      if (ind.panel) {
        const ref = buildPanelChart(ind.panel);
        if (!ind.enabled) ref.wrapper.style.display = 'none';
        panelRefsByName[ind.name] = ref;
      }
    });

    // ===========================================================
    // Equity panel（在最底）
    // ===========================================================
    const equityCanvas = makePanel('Equity (USDT)', heightForEquity);
    const equityChart = createChart(equityCanvas, baseOptions(heightForEquity));
    allCharts.push(equityChart);
    const eqLong = equityChart.addLineSeries({
      color: '#2563eb', lineWidth: 1, title: 'Long', priceLineVisible: false,
    });
    eqLong.setData(data.equity.long);
    const eqShort = equityChart.addLineSeries({
      color: '#ea580c', lineWidth: 1, title: 'Short', priceLineVisible: false,
    });
    eqShort.setData(data.equity.short);
    const eqComb = equityChart.addLineSeries({
      color: '#a855f7', lineWidth: 2, title: 'Combined', priceLineVisible: false,
    });
    eqComb.setData(data.equity.combined);

    // ===========================================================
    // 時間軸同步（依 visible time range，避免 logical range 因不同
    // 資料長度而失準）
    // ===========================================================
    let syncing = false;  // 防無限遞迴
    allCharts.forEach((chart, idx) => {
      chart.timeScale().subscribeVisibleTimeRangeChange((range) => {
        if (syncing || !range) return;
        syncing = true;
        try {
          allCharts.forEach((other, j) => {
            if (j !== idx) {
              other.timeScale().setVisibleRange(range);
            }
          });
        } finally {
          syncing = false;
        }
      });
    });

    // ===========================================================
    // 指標下拉切換（chip toggle）
    // ===========================================================
    const indicatorBar = document.getElementById('indicator-bar');
    // enabled 狀態用 Map 保存，避免重複查 data
    const indicatorEnabled = new Map(
      data.indicators.map(ind => [ind.name, ind.enabled])
    );

    function reflowPanelHeights() {
      // 依當前可見 panels 重算 panel 高度（主圖/equity 不變）
      const visibleSpecs = data.indicators
        .filter(i => i.panel && indicatorEnabled.get(i.name))
        .map(i => i.panel);
      Object.entries(panelRefsByName).forEach(([name, ref]) => {
        if (!indicatorEnabled.get(name)) return;
        const h = panelHeight(ref.spec, visibleSpecs);
        ref.wrapper.style.height = h + 'px';
        ref.chart.applyOptions({ height: h });
      });
    }

    function setIndicatorEnabled(name, enabled) {
      indicatorEnabled.set(name, enabled);
      // overlay：每條 LineSeries 切 visible
      const overlays = overlayRefsByName[name];
      if (overlays) {
        overlays.forEach(s => s.applyOptions({ visible: enabled }));
      }
      // panel：wrapper 顯隱 + reflow
      const panelRef = panelRefsByName[name];
      if (panelRef) {
        panelRef.wrapper.style.display = enabled ? '' : 'none';
        reflowPanelHeights();
      }
    }

    data.indicators.forEach(ind => {
      const chip = document.createElement('div');
      chip.className = 'ind-chip' + (ind.enabled ? ' active' : '');
      chip.textContent = ind.label;
      chip.dataset.name = ind.name;
      chip.addEventListener('click', () => {
        const next = !indicatorEnabled.get(ind.name);
        chip.classList.toggle('active', next);
        setIndicatorEnabled(ind.name, next);
      });
      indicatorBar.appendChild(chip);
    });

    // 初始 fit
    mainChart.timeScale().fitContent();

    // 視窗 resize 處理
    window.addEventListener('resize', () => {
      const w = chartsHost.clientWidth;
      allCharts.forEach(c => c.applyOptions({ width: w }));
    });

  })();
  </script>
</body>
</html>
