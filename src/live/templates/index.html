<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMA Live Paper Trading</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #0a0a0a; color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC",
                   "Hiragino Sans GB", sans-serif; font-size: 13px;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #header {
      flex: 0 0 auto; padding: 10px 18px; background: #141414;
      border-bottom: 1px solid #262626;
      display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
    }
    #title { font-size: 15px; font-weight: 600; color: #fafafa; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 4px; font-size: 12px;
      background: #1f1f1f; color: #d4d4d4;
    }
    .badge.live { background: #15301c; color: #4ade80; }
    .badge.warmup { background: #3a2e0f; color: #fbbf24; }
    .badge.paused { background: #3f1d1d; color: #fca5a5; }
    .badge.disconnected { background: #2a2a2a; color: #737373; }
    .stat { color: #a3a3a3; }
    .stat b { color: #fafafa; font-weight: 600; }
    button {
      background: #2563eb; color: #fff; border: none;
      padding: 6px 14px; border-radius: 4px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #404040; cursor: not-allowed; }
    button.danger { background: #b91c1c; }
    button.danger:hover { background: #991b1b; }

    #main {
      flex: 1 1 auto; display: flex; min-height: 0;
    }
    #chart-wrap { flex: 1 1 auto; position: relative; min-width: 0; }
    #chart { width: 100%; height: 100%; }

    #sidebar {
      flex: 0 0 360px; background: #0f0f0f; border-left: 1px solid #262626;
      display: flex; flex-direction: column; min-height: 0;
    }
    .panel {
      border-bottom: 1px solid #262626; padding: 10px 14px;
      flex: 0 0 auto;
    }
    .panel h3 {
      margin: 0 0 8px 0; font-size: 12px; color: #a3a3a3;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .panel.scroll {
      flex: 1 1 auto; min-height: 0; overflow-y: auto;
    }
    .event {
      padding: 6px 0; border-bottom: 1px solid #1f1f1f;
      font-family: ui-monospace, monospace; font-size: 11px;
      line-height: 1.4;
    }
    .event:last-child { border-bottom: none; }
    .event-time { color: #6b7280; }
    .event-kind {
      display: inline-block; min-width: 100px;
      padding: 1px 6px; border-radius: 3px;
      font-weight: 600; font-size: 10px; margin: 0 6px;
    }
    .kind-BAR             { background: #1f2937; color: #94a3b8; }
    .kind-TRADE_OPEN      { background: #15301c; color: #4ade80; }
    .kind-TRADE_CLOSE     { background: #3f1d1d; color: #fca5a5; }
    .kind-RATCHET         { background: #1e293b; color: #60a5fa; }
    .kind-SIGNAL_PENDING  { background: #3a2e0f; color: #fbbf24; }
    .kind-EQUITY          { background: #18181b; color: #6b7280; }
    .kind-PAUSED          { background: #3f1d1d; color: #fca5a5; }
    .kind-RESUMED         { background: #15301c; color: #4ade80; }
    .kind-WARMUP          { background: #1e293b; color: #93c5fd; }
    .event-payload { color: #d4d4d4; word-break: break-all; }

    .trade-row {
      display: grid; grid-template-columns: 50px 1fr auto;
      gap: 6px; padding: 4px 0; font-size: 11px;
      font-family: ui-monospace, monospace;
      border-bottom: 1px solid #1f1f1f;
    }
    .trade-row.win { color: #4ade80; }
    .trade-row.loss { color: #fca5a5; }
    .equity-row {
      display: flex; justify-content: space-between; padding: 3px 0;
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <span id="title">WMA Live —</span>
    <span class="badge" id="conn-badge">WS: connecting...</span>
    <span class="badge" id="warmup-badge">starting</span>
    <span class="stat">Bars: <b id="bars">—</b></span>
    <span class="stat">Last K: <b id="last-ts">—</b></span>
    <span class="stat">Last Close: <b id="last-close">—</b></span>
    <span class="stat">Long: <b id="long-eq">—</b></span>
    <span class="stat">Short: <b id="short-eq">—</b></span>
    <span class="stat">Total: <b id="total-eq">—</b></span>
    <span style="flex:1"></span>
    <button id="pause-btn">暫停進場</button>
  </div>
  <div id="main">
    <div id="chart-wrap"><div id="chart"></div></div>
    <div id="sidebar">
      <div class="panel" style="max-height: 30vh; overflow-y: auto;">
        <h3>Trades (recent)</h3>
        <div id="trades-list"></div>
      </div>
      <div class="panel scroll">
        <h3>Events (live)</h3>
        <div id="events-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const chartEl = document.getElementById('chart');
  const chart = LightweightCharts.createChart(chartEl, {
    layout: { background: { color: '#0a0a0a' }, textColor: '#a3a3a3' },
    grid: { vertLines: { color: '#1a1a1a' }, horzLines: { color: '#1a1a1a' } },
    rightPriceScale: { borderColor: '#262626' },
    timeScale: { borderColor: '#262626', timeVisible: true, secondsVisible: false },
    crosshair: { mode: 1 },
  });
  const candleSeries = chart.addCandlestickSeries({
    upColor: '#22c55e', downColor: '#ef4444',
    borderUpColor: '#22c55e', borderDownColor: '#ef4444',
    wickUpColor: '#22c55e', wickDownColor: '#ef4444',
  });

  let allBars = [];
  let isPaused = false;
  let markersBuffer = [];

  function fmt(n, decimals = 2) {
    if (n === undefined || n === null) return '—';
    return Number(n).toFixed(decimals);
  }
  function fmtTime(unix) {
    const d = new Date(unix * 1000);
    return d.toISOString().replace('T', ' ').slice(0, 16);
  }

  // 連 WebSocket
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/ws`);
    const badge = document.getElementById('conn-badge');

    ws.onopen = () => {
      badge.textContent = 'WS: connected';
      badge.className = 'badge live';
    };
    ws.onclose = () => {
      badge.textContent = 'WS: disconnected (retry 3s)';
      badge.className = 'badge disconnected';
      setTimeout(connectWS, 3000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      const evt = JSON.parse(e.data);
      handleEvent(evt);
    };
  }

  function handleEvent(evt) {
    pushEventLog(evt);
    if (evt.kind === 'BAR') {
      const p = evt.payload;
      const bar = {
        time: evt.ts_unix,
        open: p.open, high: p.high, low: p.low, close: p.close,
      };
      // 替換或追加
      if (allBars.length > 0 && allBars[allBars.length - 1].time === bar.time) {
        allBars[allBars.length - 1] = bar;
      } else {
        allBars.push(bar);
      }
      candleSeries.update(bar);
      document.getElementById('last-ts').textContent = fmtTime(evt.ts_unix);
      document.getElementById('last-close').textContent = fmt(p.close);
      document.getElementById('bars').textContent = allBars.length;
    } else if (evt.kind === 'TRADE_OPEN') {
      addMarker(evt.ts_unix, evt.payload.direction, 'open', evt.payload);
      addTradeRow(evt.payload, 'OPEN');
    } else if (evt.kind === 'TRADE_CLOSE') {
      addMarker(evt.ts_unix, evt.payload.direction, 'close', evt.payload);
      addTradeRow(evt.payload, 'CLOSE');
    } else if (evt.kind === 'EQUITY') {
      document.getElementById('long-eq').textContent = fmt(evt.payload.long);
      document.getElementById('short-eq').textContent = fmt(evt.payload.short);
      document.getElementById('total-eq').textContent = fmt(evt.payload.total);
    } else if (evt.kind === 'PAUSED') {
      isPaused = true; updatePauseBtn();
    } else if (evt.kind === 'RESUMED') {
      isPaused = false; updatePauseBtn();
    } else if (evt.kind === 'WARMUP') {
      const b = document.getElementById('warmup-badge');
      b.textContent = `warmed up: ${evt.payload.bars_loaded} bars`;
      b.className = 'badge live';
    }
  }

  function addMarker(unix, direction, action, payload) {
    const isLong = direction === 'long';
    const shape = action === 'open'
      ? (isLong ? 'arrowUp' : 'arrowDown')
      : 'square';
    const color = action === 'open'
      ? (isLong ? '#22c55e' : '#ef4444')
      : (payload.net_pnl > 0 ? '#4ade80' : '#fca5a5');
    const text = action === 'open'
      ? `${direction[0].toUpperCase()}OPEN`
      : `${direction[0].toUpperCase()}${payload.exit_reason || 'CLOSE'} ${fmt(payload.net_pnl, 2)}`;
    markersBuffer.push({
      time: unix,
      position: isLong ? 'belowBar' : 'aboveBar',
      color, shape, text,
    });
    markersBuffer.sort((a, b) => a.time - b.time);
    candleSeries.setMarkers(markersBuffer);
  }

  function addTradeRow(p, action) {
    const list = document.getElementById('trades-list');
    const cls = action === 'OPEN' ? '' : (p.net_pnl > 0 ? 'win' : 'loss');
    const row = document.createElement('div');
    row.className = `trade-row ${cls}`;
    const pnl = action === 'OPEN' ? '' : ` PnL ${fmt(p.net_pnl, 2)}`;
    row.innerHTML = `
      <span>${p.direction.toUpperCase()}</span>
      <span>${action} @ ${fmt(action === 'OPEN' ? p.entry_price : p.exit_price)}${pnl}</span>
      <span>${p.exit_reason || ''}</span>
    `;
    list.prepend(row);
  }

  function pushEventLog(evt) {
    const list = document.getElementById('events-list');
    const div = document.createElement('div');
    div.className = 'event';
    const payloadStr = JSON.stringify(evt.payload);
    div.innerHTML = `
      <span class="event-time">${fmtTime(evt.ts_unix)}</span>
      <span class="event-kind kind-${evt.kind}">${evt.kind}</span>
      <span class="event-payload">${payloadStr}</span>
    `;
    list.prepend(div);
    // 控制最多 200 條
    while (list.childElementCount > 200) {
      list.removeChild(list.lastChild);
    }
  }

  function updatePauseBtn() {
    const btn = document.getElementById('pause-btn');
    if (isPaused) {
      btn.textContent = '恢復進場';
      btn.className = 'danger';
    } else {
      btn.textContent = '暫停進場';
      btn.className = '';
    }
  }
  document.getElementById('pause-btn').addEventListener('click', async () => {
    const endpoint = isPaused ? '/api/resume' : '/api/pause';
    await fetch(endpoint, { method: 'POST' });
  });

  // 載入 snapshot（初始 K + 已完成 trades）
  async function loadSnapshot() {
    const r = await fetch('/api/snapshot');
    const data = await r.json();
    document.getElementById('title').textContent =
      `WMA Live — ${data.meta.symbol} ${data.meta.timeframe}`;
    isPaused = !!data.meta.paused; updatePauseBtn();
    if (data.meta.is_warmed_up) {
      const b = document.getElementById('warmup-badge');
      b.textContent = `warmed up: ${data.meta.bars_processed} bars`;
      b.className = 'badge live';
    } else {
      const b = document.getElementById('warmup-badge');
      b.textContent = 'warming up...';
      b.className = 'badge warmup';
    }

    allBars = data.ohlc;
    candleSeries.setData(allBars);
    document.getElementById('bars').textContent = allBars.length;
    if (allBars.length > 0) {
      const last = allBars[allBars.length - 1];
      document.getElementById('last-ts').textContent = fmtTime(last.time);
      document.getElementById('last-close').textContent = fmt(last.close);
    }
    document.getElementById('long-eq').textContent = fmt(data.equity.long);
    document.getElementById('short-eq').textContent = fmt(data.equity.short);
    document.getElementById('total-eq').textContent = fmt(data.equity.total);

    // 已完成 trades → markers
    const allTrades = [...data.trades.long, ...data.trades.short];
    for (const t of allTrades) {
      addMarker(t.entry_time, t.direction, 'open', { net_pnl: 0 });
      addMarker(t.exit_time, t.direction, 'close', t);
      addTradeRow({
        direction: t.direction,
        entry_price: t.entry_price,
        exit_price: t.exit_price,
        net_pnl: t.net_pnl,
        exit_reason: t.exit_reason,
      }, 'CLOSE');
    }

    chart.timeScale().fitContent();
  }

  // 窗口大小變化 → resize chart
  window.addEventListener('resize', () => {
    chart.resize(chartEl.clientWidth, chartEl.clientHeight);
  });

  loadSnapshot().then(connectWS);
</script>
</body>
</html>
