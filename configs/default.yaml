# WMA Strategy 預設設定（對應 ARCHITECTURE.md §4 + §11 三階段止損）
#
# ═══════════════════════════════════════════════════════════════════════════
# 功能總覽（可切換的模組與模式）
# ═══════════════════════════════════════════════════════════════════════════
# 區塊                  欄位                  可選值                         備註
# ─────────────────────────────────────────────────────────────────────────────
# data                  timeframe             1m / 3m / 5m / 15m / 30m       影響暖機與 sharpe 年化倍數
#                                             / 1H / 4H
# account               sizing_mode           pct  | risk                    "risk" 反推 qty；"pct" 簡單比例
# account               risk_per_trade_pct    0.0..0.10                      >0 啟用動態 risk（覆蓋固定 USDT）
# account               allow_pyramiding      bool                           true=多倉並行；false=單倉
# account               r_min_pct             >= 0                           R/entry 噪音門檻；0=關
# account               entry_hour_blacklist  list[int 0..23]                UTC 小時黑名單；[]=關
# trailing              stage3_mode           bollinger | r_ladder           跟蹤模式（exit 策略）
# trailing              stage2_pct_trigger    >= 0                           %-based OR 觸發；0=純 R-based
# trailing              early_exit_enabled    bool                           進場 N 根後主動 cancel；false=關
# trailing              early_exit_metric     peak | peak_pct | close        early-exit 度量
# trailing              stage1_time_cut_enabled bool                         hold ≥ N 根仍 stage 1 且 peak 弱 → 強制平倉
# signal_filter         mode                  off | body_sum | body_sq_sum   進場 K 實體比例濾網
# chop_filter           enabled               bool                           BBW/ATR/ADX 三條件 AND 濾網
# structure_filter      enabled               bool                           市場結構順勢濾網（pivot BoS/CHoCH）
# structure_filter      mode                  aligned | exclude_counter      嚴格順勢 vs 只擋反向
# r_cap                 mode                  off | rolling_avg              用歷史 R 平均抑制大 R trigger
# backtest              log_level             DEBUG | INFO | WARNING | ERROR 日誌等級
# backtest              force_close_at_end    bool                           回測結束強制平倉未平倉位
# ─────────────────────────────────────────────────────────────────────────────
# 開發中 / 預留：實盤 broker、Optuna 超參數、WFA、Monte Carlo（見 ARCHITECTURE.md §10）
# ═══════════════════════════════════════════════════════════════════════════

data:
  # 唯讀來源（PPO_TradingModel 已下載的 1m parquet）
  # 實際檔案路徑 = source_dir / "{symbol}_1m.parquet"
  # 切換標的時只改 symbol；如要換資料源資料夾才動 source_dir
  source_dir: /Users/jim_hsieh/Documents/GitHub/PPO_TradingModel/data/processed
  symbol: BTCUSDT
  timeframe: 15m   # 1m / 3m / 5m / 15m / 30m / 1H / 4H

period:
  in_sample:
    start: 2023-01-01
    end:   2024-12-31
  out_of_sample:
    start: 2025-01-01
    end:   null   # null = 用到資料最後一根

account:
  initial_capital: 1000.0         # USDT，多空各 1000

  # 倉位計算模式
  #   pct:  每筆倉位 notional = equity × position_size_pct（簡單比例）
  #   risk: 每筆倉位以「撞到 stop 時固定虧損 risk_per_trade_usdt」反推 quantity，
  #         qty = R / [|entry−stop| + (entry+stop)×taker]（含雙向手續費；
  #         滑點已內含於 entry_price，不重複計）。
  #         若 R 過小導致 notional > equity → 視為過槓桿，拒絕該筆訂單
  sizing_mode: risk                # pct | risk
  position_size_pct: 0.60         # sizing_mode=pct 時生效
  risk_per_trade_usdt: 10.0        # sizing_mode=risk 且 risk_per_trade_pct=0 時生效（固定 USDT）
  # 動態 risk：每筆可虧損金額 = equity_now × risk_per_trade_pct
  #   > 0 啟用，覆蓋 risk_per_trade_usdt（equity 漲 → risk 漲，equity 跌 → risk 跌）
  #   = 0 關閉，沿用 risk_per_trade_usdt 固定值
  #   基數為策略各自的 equity（多/空獨立帳戶），不是合併權益
  #   上限驗證：(0, 0.10] — 超過 10% 視為誤打（如 0.1 vs 0.01）
  risk_per_trade_pct: 0.0        # 1% equity per trade

  # 多倉並行（pyramiding）
  #   false：已有持倉時會略過新訊號
  #   true：每根 K 線最多新增 1 筆，每筆獨立 stop / 獨立 trailing controller
  #         受 leverage_cap 限制總 notional：Σ open_notional + new ≤ equity × leverage_cap
  allow_pyramiding: true
  # 內部槓桿上限。對應 Binance 端建議「逐倉 20x」配置：
  #   - 單筆峰值 leverage ≈ risk_per_trade_pct / r_pct，r_min_pct=0.0022 下 ≈ 4.5x
  #   - leverage_cap=8 → 允許 2–3 筆典型倉位同時 open，pathological 第 4 筆被拒
  #   - 對應 Exchange 強平距離 ~4.5%（20x），遠大於停損距離 0.3–0.8% → 不會爆倉
  leverage_cap: 8.0

  # R 噪音過濾：R_price / entry_price < r_min_pct → 拒絕該筆進場
  #   原因：R 太小時 qty 變大、手續費佔比過高，趨勢段未達就被吃光
  #   0 = 關閉；常用值 0.0012（0.12%，15m ETH 經驗值）
  r_min_pct: 0.0022

  # 進場時段黑名單（UTC，0..23）。命中 → 該筆 pending 被拒絕。
  # 判斷對象為「fill bar 的 hour」（pending 撮合所在的 K 線），與 analyze_day_hour.py 一致。
  # 空 list = 不啟用（當前選擇）
  #
  # 歷史：曾用 [0, 12]（IS PF 1.42→1.61）但 audit_entry_hour_blacklist.py
  # 顯示 hour 12 在 OOS 反而 +6.09 avg（樣本 2 筆），整體 OOS PF 改善僅
  # 0.96→1.00（雜訊層級），判定為 IS-side overfit。
  entry_hour_blacklist: []

fees:
  taker_fee_rate: 0.0005    # 0.05%
  maker_fee_rate: 0.0002    # 0.02%
  slippage_pct:   0.0003    # 0.03%

strategy:
  # 進場條件（一律使用原始 K 線）
  # WMA per-direction：long 維持 4/6（穩定）、short 用 2/4（更敏感抓快下跌）
  wma_long_fast:  4
  wma_long_slow:  6
  wma_short_fast: 2
  wma_short_slow: 4

  # 三階段止損（ARCHITECTURE.md §11）
  trailing:
    # Stage 1：剛進場、初始 swing-based 保護
    swing_lookback:           4         # 用「前 N 根」原始 K 線的反向極值
    stage1_slippage_buffer:   0.0003    # 0.03% 推離極值

    # Stage 2：保本鎖利
    # stage2_enabled=false → 完全跳過 stage 2：stage 1 達 stage3_trigger 直接進 stage 3，
    # 不經過保本+buffer 階段；stage 3 也不用 stage2_value 當 floor。
    stage2_enabled:             true
    stage2_normal_trigger_r:    1.2     # 1.2R 觸發保本
    stage2_buffer_r:            0.2     # 保本 stop 額外 +0.2R buffer
    # %-based OR 觸發：peak_pct = (peak − entry) / entry 達此值也觸發 stage 2。
    # 0 = 關閉（純 R-based 舊版）；>0 = OR 條件
    # 實測：0.0030 救 750 s1→s2 但同時砍掉 445 s3→s2，net −100 USDT。維持 0。
    stage2_pct_trigger:         0.0

    # Stage 3：跟蹤模式
    stage3_normal_trigger_r:    2.0     # 進入 Stage 3 的 trigger

    # stage3_mode：
    #   bollinger = Bollinger band 跟蹤（原版）— BB lower 隨價漲抬升，碰到就拉 stop
    #               優點：適應波動性、不需 R 倍數調校
    #               缺點：BB 易回勾、stop 跟不上突破段
    #   r_ladder  = R 倍數階梯（目前預設）— peak 跨 (N+offset)R → stop 鎖在 N×R
    #               優點：階梯式鎖利、突破段抓得乾淨
    #               缺點：需要參數調校（first_trigger / step / offset）
    stage3_mode: r_ladder              # bollinger | r_ladder

    # bollinger mode 參數
    bollinger_period:           20
    bollinger_num_std:          2.0

    # r_ladder mode 參數（normal R）
    # 2026-05-14: step 0.5→1.0、offset 0.2→0.5（per OOS sweep，見 scripts/sweep_r_ladder.py）
    # 理由：原本檔距 0.5 / 回吐 0.2 太密，趨勢中段容易被洗掉。
    # OOS PF 0.92→1.13、OOS ret -0.72%→+1.14%、Long s3 avg PnL +40%
    r_ladder_normal_first_trigger:   2.5   # 2.5R 第一檔啟動（鎖 2.0R）
    r_ladder_normal_step:            1.0   # 檔距（2.5 → 3.5 → 4.5 …）
    r_ladder_trigger_offset:         0.5   # trigger − stop（3.5 觸發 → 鎖 3.0）

    # -------- Abnormal R fallback（防呆參數）--------
    # 何時生效：當 R/entry < 2 × taker_fee（即 stop 距離被手續費吃光）。
    # 當前設定下 (r_min_pct=0.0022 > 2×0.0005=0.001) 不可能觸發 abnormal，
    # 這些參數為 dead code；保留以便未來實驗 r_min_pct=0 跑全訊號時仍有 fallback。
    # 若 r_min_pct ≥ 2×taker_fee 卻有 abnormal trade 進到 trailing → 引擎會 raise
    # AccountInvariantError（src/strategy/trailing.py），代表 gate 被繞過。
    stage2_abnormal_trigger_r:        2.4
    stage3_abnormal_trigger_r:        4.0
    r_ladder_abnormal_first_trigger:  5.6
    r_ladder_abnormal_step:           2.0
    r_ladder_abnormal_trigger_offset: 0.6

    # ---- Early-exit（進場後 N 根 K 主動 cancel）----
    # 觀測期最後一根 K 收盤後若 stage 仍為 1 且度量值 < 門檻 → bar.close 平倉
    # metric:
    #   peak     = 該 bar 最大有利浮盈 / R（多 = (high − entry)/R；空鏡像）— R 單位
    #   peak_pct = 該 bar 最大有利浮盈 / entry（多 = (high − entry)/entry；空鏡像）— 百分比
    #   close    = 該 bar 收盤相對 entry / R（多 = (close − entry)/R；可為負）
    # 實測（2-yr IS, 15m, WMA 4/6）：
    #   first_close_r 比 first_peak_r 更乾淨；close < −0.5R cut 24.6% s1 vs 4.7% s3 (5.2:1)
    early_exit_enabled:           false
    early_exit_observation_bars:  1
    early_exit_metric:            peak        # peak | peak_pct | close
    early_exit_min_peak_r:        0.0         # peak     mode 門檻（R 單位）
    early_exit_min_peak_pct:      0.0         # peak_pct mode 門檻（fraction，e.g. 0.001 = 0.1%）
    early_exit_min_close_r:       -0.5        # close    mode 門檻（負值 = 收盤需高於 entry − 0.5R）

    # Stage 1 time-cut：持倉 ≥ N 根 K 仍 stage 1 且 peak < threshold → 強制平倉
    # 與 early_exit 差別：early_exit 只在觀測期最後一根檢查一次；time_cut 持續檢查。
    # 動機：long s1 avg_hold 30.8 / med 13、short s1 avg 58.3 / med 16 嚴重右偏，
    # 死撐 hold > 8 bar 且 peak < 0.5R 的訊號釋放資金與機會成本。
    stage1_time_cut_enabled:        true
    stage1_time_cut_bars:           8           # 進場後 N 根 K 才開始檢查（含進場 K）
    stage1_time_cut_peak_r_max:     0.5         # peak < 此值才平（已突破代表還有機會）

  # 進場訊號濾網（六根 K 實體比例閘門）
  #   mode:
  #     off          = 關閉（預設，與舊版一致）
  #     body_sum     = 線性實體比例：陽K長度合 / 全部長度合
  #     body_sq_sum  = 平方加權：陽K長度² 合 / 全部長度² 合（大實體影響加倍）
  #   threshold: LONG 需 ratio ≥ threshold；SHORT 需 ratio ≤ (1 − threshold)
  #   window: 進場前回看根數（含訊號 K 自己，一律用原始 K）
  signal_filter:
    mode: body_sum                # off | body_sum | body_sq_sum
    window: 6
    threshold: 0.73               # IS sweep (0.65..0.85 step 0.01) sweetspot：
                                  # n=97, s3/s1=0.80, combined +207 USDT

  # 盤整濾網（chop filter，AND 邏輯：三條件全過才放行）
  #   BBW_rank ≥ bbw_rank_min  AND  ATR_rank ≥ atr_rank_min  AND  ADX ≥ adx_min
  # 動機：
  #   - 避免在低波動 / squeeze 區間做單（資金費率成本還未模型化，先用波動門檻護盤）
  #   - 與 trailing 的 Bollinger band **不共用**（職責分離：entry gate vs exit）
  # 暖機：~ rank_window 根 K 線（預設 200）→ 開頭 ~200 根訊號必拒絕
  # 研究依據：sweep_chop_filters_combo.py IS PF 0.768 → 0.96（n 1300+ → 874）
  chop_filter:
    enabled: true
    # 波動門檻（sweep_retry_vol.py 2-yr IS sweep）：
    #   vol=5  (rank ≥ 5)  → PnL +243 / PF 1.35 / MDD 4.9% / Sharpe 1.11
    #   vol=45 (rank ≥ 45) → PnL +236 / PF 1.61 / MDD 3.2% / Sharpe 1.27 ★ risk-adjusted 最佳
    # 取 45：絕對 PnL 只少 7，但 PF +0.26、MDD −1.7pp、Sharpe +0.16；
    # long s3/s1=1.00（vs 5: 0.91），new entries 邊際品質更高。
    bbw_rank_min: 45.0            # BBW 百分位下界（%）
    atr_rank_min: 45.0            # ATR 百分位下界（%）
    adx_min: 20.0                 # ADX 絕對值下界（trend strength，不在這次 sweep 範圍）
    bb_period: 20                 # 獨立 BB 週期（與 trailing 分開）
    bb_num_std: 2.0
    atr_period: 14
    adx_period: 14
    rank_window: 200              # ATR / BBW rolling percent rank 視窗

  # 結構順勢濾網（market structure aligned-direction gate）
  #   只在「開倉時刻」擋；既有持倉/止損不受影響，結構翻轉不會主動平倉。
  # mode:
  #   "aligned"         = 嚴格——進場方向必須與 ms_trend 同向（long 要 bull、short 要 bear）；
  #                       ms_trend 為空（暖機/未確認結構）→ 一律擋
  #   "exclude_counter" = 寬鬆——只擋反向；aligned + none 都放行
  # 暖機：pivot_left + pivot_right 根 K 線
  # 研究依據：report_stage_market_structure.py 在 BTC 2 年 IS：
  #   stage 3 aligned 比例 long 60.8% / short 64.8% vs stage 1 ~48-50%（差 13-15pp）
  structure_filter:
    enabled: true                 # 預設啟用；long/short 各自只接同向結構訊號
    mode: aligned                 # aligned | exclude_counter
    pivot_left: 10                # 與 viewer market_structure 指標一致
    pivot_right: 10

  # 進場重試（entry retry）— 把 WMA 交叉視為機會訊號
  #   交叉發生後給連續 N 根 K 嘗試其他條件（signal_filter/chop_filter/
  #   structure_filter/結構檢查/Stage 1 安全）；任一根全過 → 進場、消費 pending。
  # WMA 交叉條件不重檢；視為訊號鎖定。重試時各條件視窗自動跟著 bar 推進。
  # 1 = 原行為（只看交叉根當下）
  # 3 = 給 3 根機會（交叉根 + 接下來 2 根）
  # Per-direction：long 與 short 各自獨立。實測 2-yr IS：
  #   long  max=1: ret +24.88% / PF 1.78 / MDD  5.5%
  #   long  max=3: ret  +7.71% / PF 1.03 / MDD 29.9%（品質衰減大）
  #   short max=1: ret  -0.56% / PF 0.98 / MDD 14.7%
  #   short max=3: ret -84.35% / PF 0.69 / MDD 86.9%（爆倉等級，禁用！）
  # → 目前兩邊都先 1（保守）；之後若做更精細的 long 端 retry 實驗可只動 long_max_attempts。
  entry_retry:
    long_max_attempts: 1
    short_max_attempts: 1

  # R-cap：用近期 trades 的平均 R 抑制單筆過大 R 的影響（trigger-only 版本）
  #   mode:
  #     "off"        = 關閉（預設，與舊版一致）
  #     rolling_avg  = 進場前 window 根 K 內的歷史 trades + 未平倉持倉初始 R 平均；
  #                    若 actual_R > avg_R → 用 avg_R 當 progress_r 分母 → stage 2/3/r_ladder
  #                    的 trigger 提前達成。stop 放置（stage2 buffer、ladder offset）仍用
  #                    實際 R 保留趨勢段呼吸空間。Stage 1 stop 永遠不變。
  #   window: 過去 N 根 K 線
  r_cap:
    mode: "off"
    window: 100

backtest:
  output_dir: results
  show_progress: true
  # 回測尾段如有未平倉位：true → 強制以最後一根 bar.close 平倉；false → 直接丟棄不入 metrics
  force_close_at_end: false
  log_level: INFO   # DEBUG | INFO | WARNING | ERROR
